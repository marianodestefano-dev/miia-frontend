<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIIA - Gestionar Contactos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    :root {
      --primary: #3B5BFF;
      --primary-dark: #2A45DB;
      --secondary: #FF1A8C;
      --accent: #34D399;
      --bg-light: #0F0F0F;
      --bg-white: #0F0F0F;
      --bg-card: #141414;
      --bg-surface: #1A1A1A;
      --text-dark: #F1F5F9;
      --text-body: #94A3B8;
      --text-muted: #64748B;
      --gradient-main: linear-gradient(135deg, #3B5BFF 0%, #8B30E0 50%, #FF1A8C 100%);
      --shadow-sm: 0 2px 8px rgba(59,91,255,0.08);
      --shadow-md: 0 8px 30px rgba(59,91,255,0.12);
      --shadow-lg: 0 20px 60px rgba(59,91,255,0.15);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 100px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-body);
      background: var(--bg-light);
      min-height: 100vh;
      line-height: 1.6;
      padding-top: 64px;
      -webkit-font-smoothing: antialiased;
    }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .fade-in.visible { opacity: 1; transform: translateY(0); }

    /* ═══ NAVBAR ═══ */
    #navbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(3,5,8,0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(59,91,255,0.08);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.3s ease;
    }
    #navbar.scrolled {
      background: rgba(3,5,8,0.95);
      box-shadow: var(--shadow-sm);
    }
    .nav-logo {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
    }
    .nav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .nav-back {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
    }
    .nav-back:hover { opacity: 0.7; }
    .logout-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .logout-btn:hover { opacity: 0.85; }

    /* ═══ CONTAINER ═══ */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    .contacts-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .card {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: 24px;
    }

    .card h2 {
      color: var(--text-dark);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(102,126,234,0.1);
    }

    /* Conversations List */
    .conversations-list {
      max-height: 600px;
      overflow-y: auto;
    }

    .conversation-item {
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      margin-bottom: 8px;
    }

    .conversation-item:hover {
      background: var(--bg-light);
      border-color: rgba(102,126,234,0.2);
    }

    .conversation-item.active {
      background: rgba(102,126,234,0.1);
      border-color: var(--primary);
    }

    .conversation-name {
      font-weight: 600;
      color: var(--text-dark);
      font-size: 0.95rem;
    }

    .conversation-phone {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .conversation-preview {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* CRM Form */
    .crm-form {
      display: none;
    }

    .crm-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      color: var(--text-dark);
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(102,126,234,0.2);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--text-dark);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
    }

    .btn-save {
      width: 100%;
      padding: 12px;
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .btn-save:hover {
      transform: translateY(-2px);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Filter tabs */
    .filter-tabs { display:flex; gap:4px; margin-bottom:16px; }
    .filter-tab { padding:8px 16px; border:1px solid rgba(102,126,234,0.15); border-radius:var(--radius-full); background:transparent; color:var(--text-muted); font-size:0.85rem; font-weight:600; cursor:pointer; transition:all 0.2s; }
    .filter-tab:hover { border-color:var(--primary); color:var(--primary); }
    .filter-tab.active { background:var(--gradient-main); color:white; border-color:transparent; }
    .filter-tab .count { display:inline-block; background:rgba(255,255,255,0.25); padding:1px 7px; border-radius:10px; font-size:0.75rem; margin-left:4px; }
    .filter-tab.active .count { background:rgba(255,255,255,0.3); }

    .search-bar { width:100%; padding:8px 14px; border:1px solid rgba(102,126,234,0.15); border-radius:var(--radius-full); font-size:0.88rem; margin-bottom:12px; }
    .search-bar:focus { outline:none; border-color:var(--primary); }

    .contact-type-badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:0.72rem; font-weight:600; margin-left:6px; }
    .type-lead { background:rgba(245,158,11,0.12); color:#d97706; }
    .type-cliente { background:rgba(37,211,102,0.12); color:#16a34a; }
    .type-otro { background:rgba(136,136,164,0.12); color:var(--text-muted); }

    @media (max-width: 768px) {
      .contacts-layout { grid-template-columns: 1fr; }
      #navbar { padding: 0 20px; }
      .container { padding: 20px 16px 60px; }
    }
  </style>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo"><svg style="width:18px;height:18px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="9" cy="16" r="1"/><circle cx="15" cy="16" r="1"/><path d="M12 2v4M8 11V7a4 4 0 0 1 8 0v4"/></svg> MIIA</a>
    <div class="nav-actions">
      <a href="javascript:goBack()" class="nav-back">← Volver</a>
      <button class="logout-btn" onclick="handleLogout()">Cerrar Sesión</button>
    </div>
  </nav>

  <!-- Container -->
  <div class="container">
    <div class="contacts-layout">
      <!-- Conversations List -->
      <div class="card fade-in">
        <h2><svg style="width:18px;height:18px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> Conversaciones de WhatsApp</h2>
        <input type="text" class="search-bar" id="contactSearch" placeholder="Buscar contacto..." oninput="applyContactFilter()">
        <div class="filter-tabs" id="filterTabs">
          <button class="filter-tab active" onclick="setFilter('all',this)">Todos <span class="count" id="countAll">0</span></button>
          <button class="filter-tab" onclick="setFilter('lead',this)">Leads <span class="count" id="countLead">0</span></button>
          <button class="filter-tab" onclick="setFilter('cliente',this)">Clientes <span class="count" id="countCliente">0</span></button>
          <button class="filter-tab" onclick="setFilter('otro',this)">Otros <span class="count" id="countOtro">0</span></button>
        </div>
        <div class="conversations-list" id="conversationsList">
          <div class="empty-state">
            <div class="empty-state-icon"><svg style="width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
            <p>Cargando conversaciones...</p>
          </div>
        </div>
      </div>

      <!-- CRM Panel -->
      <div class="card fade-in">
        <h2><svg style="width:18px;height:18px;vertical-align:middle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Información del Contacto</h2>
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon"><svg style="width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
          <p>Selecciona un contacto para editar su información</p>
        </div>
        <form class="crm-form" id="crmForm" onsubmit="saveContact(event)">
          <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="contactName" disabled style="background: var(--bg-light); color: var(--text-muted);">
          </div>
          <div class="form-group">
            <label>Teléfono</label>
            <input type="tel" id="contactPhone" disabled style="background: var(--bg-light); color: var(--text-muted);">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="contactEmail" placeholder="email@example.com">
          </div>
          <div class="form-group">
            <label>Tipo de contacto</label>
            <select id="contactType">
              <option value="lead">🟡 Lead</option>
              <option value="cliente">🟢 Cliente</option>
              <option value="otro">⚪ Otro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Estado</label>
            <select id="contactStatus">
              <option value="lead">🟡 Lead</option>
              <option value="client">🟢 Cliente</option>
              <option value="lost">🔴 Perdido</option>
            </select>
          </div>
          <div class="form-group">
            <label>Notas</label>
            <textarea id="contactNotes" placeholder="Agrega notas sobre este contacto..."></textarea>
          </div>
          <button type="submit" class="btn-save">Guardar cambios</button>
        </form>
      </div>
    </div>
  </div>

  <script src="toast.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB_d3somFQOR17zBVKyO0wuSftqqT0t4vk",
      authDomain: "miia-app-8cbd0.firebaseapp.com",
      projectId: "miia-app-8cbd0",
      storageBucket: "miia-app-8cbd0.firebasestorage.app",
      messagingSenderId: "481282126913",
      appId: "1:481282126913:web:c5c8e74ce51d3d9a6aa509"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;
    let clientSlug = '';
    let selectedPhone = null;
    let allConversations = [];
    let contactTypes = {}; // phone -> 'lead'|'cliente'|'otro'
    let activeFilter = 'all';

    function toSlug(email) {
      return email.split('@')[0].replace(/[^a-z0-9]/gi, '-').toLowerCase();
    }

    function readUrlParams() {
      const params = new URLSearchParams(window.location.search);
      clientSlug = params.get('u') || '';
    }

    function goBack() {
      const urlParams = new URLSearchParams(window.location.search);
      const adminView = urlParams.get('adminView') === '1';
      const impersonateUid = urlParams.get('impersonateUid');
      const parts = [];
      if (clientSlug) parts.push('u=' + clientSlug);
      if (adminView && impersonateUid) {
        parts.push('adminView=1');
        parts.push('impersonateUid=' + impersonateUid);
      }
      window.location.href = 'owner-dashboard.html' + (parts.length ? '?' + parts.join('&') : '');
    }

    // Auth guard
    auth.onAuthStateChanged(async user => {
      readUrlParams();

      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      const urlParams = new URLSearchParams(window.location.search);
      const adminView = urlParams.get('adminView') === '1';
      const impersonateUid = urlParams.get('impersonateUid');

      if (!adminView) {
        try { const _tok = await user.getIdToken(); const _r = await fetch('https://miia-backend-production.up.railway.app/api/is-admin',{headers:{Authorization:'Bearer '+_tok}}); const _d = await _r.json(); if(_d.isAdmin){window.location.href='admin-owner-dashboard.html';return;} } catch(_){}
      }

      const targetUid = (adminView && impersonateUid) ? impersonateUid : user.uid;

      const doc = await db.collection('users').doc(targetUid).get();
      if (!doc.exists) {
        window.location.href = 'login.html';
        return;
      }

      const userData = doc.data();
      if (userData.role === 'agent') {
        window.location.href = 'agent-owner-dashboard.html';
        return;
      }

      currentUser = { ...user, uid: targetUid };

      // Barra de admin view
      if (adminView && impersonateUid) {
        const bar = document.createElement('div');
        bar.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1a2e;color:white;text-align:center;padding:10px;font-size:0.85rem;z-index:9999;';
        bar.innerHTML = `👁 <strong>Modo Admin:</strong> Viendo contactos de ${doc.exists ? doc.data().email : impersonateUid} &nbsp;|&nbsp; <a href="owner-dashboard.html?adminView=1&impersonateUid=${impersonateUid}" style="color:#667eea;">← Dashboard</a> &nbsp;|&nbsp; <a href="admin-dashboard.html" style="color:#667eea;">Volver a Admin</a>`;
        document.body.appendChild(bar);
        document.body.style.paddingBottom = '45px';
      }

      loadConversations();
      setupUI();
    });

    async function loadConversations() {
      try {
        const res = await fetch('https://miia-backend-production.up.railway.app/api/conversations');
        const data = await res.json();

        if (!data || !Array.isArray(data)) {
          document.getElementById('conversationsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg style="width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><p>Sin conversaciones aún</p></div>';
          return;
        }

        allConversations = data;
        await loadContactTypes();
        updateCounts();
        applyContactFilter();
      } catch (error) {
        console.error('Error cargando conversaciones:', error);
        document.getElementById('conversationsList').innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg style="width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></div><p>Error al cargar conversaciones</p></div>';
      }
    }

    async function loadContactTypes() {
      if (!currentUser) return;
      const snapshot = await db.collection('contacts')
        .where('client_uid', '==', currentUser.uid)
        .get();
      snapshot.forEach(doc => {
        const d = doc.data();
        if (d.phone && d.contactType) contactTypes[d.phone] = d.contactType;
      });
    }

    function getContactType(phone) {
      return contactTypes[phone] || 'otro';
    }

    function updateCounts() {
      let leads = 0, clientes = 0, otros = 0;
      allConversations.forEach(c => {
        const type = getContactType(c.phoneNumber || c.phone);
        if (type === 'lead') leads++;
        else if (type === 'cliente') clientes++;
        else otros++;
      });
      document.getElementById('countAll').textContent = allConversations.length;
      document.getElementById('countLead').textContent = leads;
      document.getElementById('countCliente').textContent = clientes;
      document.getElementById('countOtro').textContent = otros;
    }

    function setFilter(filter, btn) {
      activeFilter = filter;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      applyContactFilter();
    }

    function applyContactFilter() {
      const q = (document.getElementById('contactSearch').value || '').toLowerCase();
      const filtered = allConversations.filter(c => {
        const phone = c.phoneNumber || c.phone || '';
        const name = c.name || '';
        const type = getContactType(phone);
        if (activeFilter !== 'all' && type !== activeFilter) return false;
        if (q && !name.toLowerCase().includes(q) && !phone.includes(q)) return false;
        return true;
      });
      renderConversations(filtered);
    }

    function renderConversations(list) {
      const container = document.getElementById('conversationsList');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg style="width:48px;height:48px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><p>Sin contactos en este grupo</p></div>';
        return;
      }
      const typeClass = { lead:'type-lead', cliente:'type-cliente', otro:'type-otro' };
      const typeLabel = { lead:'Lead', cliente:'Cliente', otro:'Otro' };
      container.innerHTML = list.map(conv => {
        const phone = conv.phoneNumber || conv.phone || '';
        const name = conv.name || 'Sin nombre';
        const type = getContactType(phone);
        return `<div class="conversation-item" onclick="selectContact('${phone}', '${name.replace(/'/g, "\\'")}')">
          <div class="conversation-name">${name}<span class="contact-type-badge ${typeClass[type]}">${typeLabel[type]}</span></div>
          <div class="conversation-phone">${phone}</div>
          <div class="conversation-preview">${conv.lastMessage || ''}</div>
        </div>`;
      }).join('');
    }

    async function selectContact(phone, name) {
      selectedPhone = phone;
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
      event.target.closest('.conversation-item').classList.add('active');

      // Load CRM data from Firestore
      const docId = currentUser.uid + '_' + phone;
      const doc = await db.collection('contacts').doc(docId).get();
      const data = doc.exists ? doc.data() : {};

      document.getElementById('contactName').value = name;
      document.getElementById('contactPhone').value = phone;
      document.getElementById('contactEmail').value = data.email || '';
      document.getElementById('contactType').value = data.contactType || getContactType(phone);
      document.getElementById('contactStatus').value = data.status || 'lead';
      document.getElementById('contactNotes').value = data.notes || '';

      document.getElementById('emptyState').style.display = 'none';
      document.getElementById('crmForm').classList.add('active');
    }

    async function saveContact(event) {
      event.preventDefault();

      if (!selectedPhone) return;

      try {
        const docId = currentUser.uid + '_' + selectedPhone;
        const newType = document.getElementById('contactType').value;
        await db.collection('contacts').doc(docId).set({
          client_uid: currentUser.uid,
          phone: selectedPhone,
          email: document.getElementById('contactEmail').value,
          contactType: newType,
          status: document.getElementById('contactStatus').value,
          notes: document.getElementById('contactNotes').value,
          updated_at: new Date()
        }, { merge: true });
        contactTypes[selectedPhone] = newType;
        updateCounts();
        applyContactFilter();

        showToast('Contacto guardado exitosamente', 'success');
      } catch (error) {
        showToast('Error: ' + error.message, 'error');
      }
    }

    function setupUI() {
      window.addEventListener('scroll', () => {
        document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50);
      });

      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry, i) => {
          if (entry.isIntersecting) {
            setTimeout(() => entry.target.classList.add('visible'), i * 100);
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

      document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    }

    function handleLogout() {
      if (confirm('¿Cerrar sesión?')) {
        localStorage.removeItem('miia_user');
        auth.signOut();
        window.location.href = 'login.html';
      }
    }
  </script>
