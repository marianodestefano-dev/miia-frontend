<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIIA - Entrenar</title>
  <style>
    /* ═══════════════════════════════════════
       MIIA SaaS Design System
       ═══════════════════════════════════════ */
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --accent: #25d366;
      --accent-dark: #1ebe5a;
      --bg-light: #f5f7fa;
      --bg-white: #ffffff;
      --text-dark: #1a1a2e;
      --text-body: #4a4a6a;
      --text-muted: #8888a4;
      --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-accent: linear-gradient(135deg, #25d366 0%, #1ebe5a 100%);
      --shadow-sm: 0 2px 8px rgba(102, 126, 234, 0.08);
      --shadow-md: 0 8px 30px rgba(102, 126, 234, 0.12);
      --shadow-lg: 0 20px 60px rgba(102, 126, 234, 0.18);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-body);
      background: var(--bg-light);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ═══ ANIMATIONS ═══ */
    .fade-in { animation: fadeIn 0.6s ease forwards; }
    .fade-in-up { animation: fadeInUp 0.6s ease forwards; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ═══ HEADER ═══ */
    .header {
      background: var(--gradient-main);
      color: white;
      padding: 24px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.8rem;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
    }

    .back-btn {
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: var(--radius-md);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .back-btn:hover {
      background: white;
      color: var(--primary);
      border-color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    /* ═══ CONTAINER ═══ */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    /* ═══ SETUP CARD ═══ */
    .setup-card {
      background: var(--bg-white);
      padding: 44px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      margin-bottom: 32px;
      border: 1px solid rgba(102, 126, 234, 0.1);
      animation: fadeInUp 0.6s ease forwards;
    }

    .setup-card h2 {
      color: var(--text-dark);
      margin-bottom: 20px;
      font-size: 2rem;
      text-align: center;
      font-weight: 700;
    }

    .setup-card p {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.95rem;
    }

    /* ═══ BUTTONS ═══ */
    .btn {
      width: 100%;
      padding: 14px;
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(102, 126, 234, 0.3);
    }

    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ═══ QR CODE ═══ */
    #qrCode {
      display: flex;
      justify-content: center;
      margin: 30px 0;
      animation: fadeInUp 0.6s ease;
    }

    #qrCode img {
      max-width: 300px;
      border-radius: var(--radius-lg);
      border: 3px solid var(--primary);
      padding: 15px;
      background: var(--bg-light);
    }

    #qrStatus {
      text-align: center;
      color: var(--text-muted);
      font-weight: 500;
      font-size: 0.95rem;
    }

    .success-message {
      text-align: center;
      color: var(--accent);
      font-size: 1.1rem;
      margin-bottom: 20px;
      font-weight: 600;
    }

    /* ═══ CHAT CONTAINER ═══ */
    .chat-container {
      background: var(--bg-white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      height: 650px;
      border: 1px solid rgba(102, 126, 234, 0.1);
      animation: fadeInUp 0.6s ease forwards;
      overflow: hidden;
    }

    .chat-header {
      padding: 20px 24px;
      background: var(--gradient-main);
      color: white;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .chat-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .chat-header-info h3 {
      margin-bottom: 4px;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .chat-header-info p {
      font-size: 0.8rem;
      opacity: 0.85;
    }

    .chat-messages {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg-light);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      display: flex;
      gap: 8px;
      animation: fadeInUp 0.3s ease;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.miia {
      justify-content: flex-start;
    }

    .message-bubble {
      max-width: 65%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      word-wrap: break-word;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .message.user .message-bubble {
      background: var(--gradient-main);
      color: white;
      border-radius: 18px 18px 4px 18px;
    }

    .message.miia .message-bubble {
      background: var(--bg-white);
      color: var(--text-dark);
      border-radius: 18px 18px 18px 4px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .chat-input {
      display: flex;
      padding: 16px;
      background: var(--bg-white);
      border-top: 1px solid rgba(102, 126, 234, 0.1);
      gap: 12px;
      align-items: flex-end;
    }

    .chat-input input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid rgba(102, 126, 234, 0.15);
      border-radius: var(--radius-full);
      font-size: 0.95rem;
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .chat-input input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .chat-input input::placeholder {
      color: var(--text-muted);
    }

    .chat-input button {
      padding: 12px 24px;
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.3s ease;
    }

    .chat-input button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
    }

    .chat-input button:active { transform: translateY(0); }
    .chat-input button:disabled { opacity: 0.6; cursor: not-allowed; }

    .hidden { display: none !important; }

    /* ═══ RESPONSIVE ═══ */
    @media (max-width: 600px) {
      .header { padding: 16px 20px; }
      .container { padding: 0 16px; }
      .setup-card { padding: 32px 24px; }
      .chat-container { height: 500px; }
      .message-bubble { max-width: 85%; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🧠 Entrenar a MIIA</h1>
    <a href="dashboard.html" class="back-btn">← Volver al Dashboard</a>
  </div>

  <div class="container">
    <!-- PASO 1: Inicio simple -->
    <div id="setupCard" class="setup-card">
      <h2>Conectar WhatsApp</h2>
      <p>MIIA usará la API Key configurada en el servidor para conectarse</p>
      <button class="btn" onclick="showWhatsAppSetup()">Conectar WhatsApp</button>
    </div>

    <!-- PASO 2: QR de WhatsApp -->
    <div id="whatsappSetup" class="setup-card hidden">
      <h2>Escanea el código QR</h2>
      <div id="qrContainer">
        <p id="qrStatus">Generando QR...</p>
        <div id="qrCode"></div>
      </div>
      <div id="whatsappConnected" class="hidden">
        <p class="success-message">✅ WhatsApp conectado correctamente</p>
        <button id="startChatBtn" class="btn hidden" onclick="goToChat()">Empezar a entrenar</button>
      </div>
    </div>

    <!-- PASO 3: Chat con MIIA -->
    <div id="chatContainer" class="hidden">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-avatar">🤖</div>
          <div class="chat-header-info">
            <h3>MIIA</h3>
            <p>Tu asistente IA con WhatsApp conectado</p>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input">
          <input type="text" id="messageInput" placeholder="Escribe un mensaje..." onkeypress="handleKeyPress(event)">
          <button id="sendBtn" onclick="sendMessage()">Enviar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  
  <!-- Socket.io -->
  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>

  <script>
    const BACKEND_URL = 'https://miia-backend-production.up.railway.app';
    // const BACKEND_URL = 'http://localhost:3000';
    let socket = null;
    let userId = 'user_' + Date.now();

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyB_d3somFQOR17zBVKyO0wuSftqqT0t4vk",
      authDomain: "miia-app-8cbd0.firebaseapp.com",
      projectId: "miia-app-8cbd0",
      storageBucket: "miia-app-8cbd0.firebasestorage.app",
      messagingSenderId: "481282126913",
      appId: "1:481282126913:web:c5c8e74ce51d3d9a6aa509"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showWhatsAppSetup() {
      document.getElementById('setupCard').classList.add('hidden');
      document.getElementById('whatsappSetup').classList.remove('hidden');
      connectWhatsApp();
    }

    function connectWhatsApp() {
      console.log('\n═══════════════════════════════════');
      console.log('🚀 INICIANDO CONEXIÓN A WHATSAPP');
      console.log('═══════════════════════════════════');
      
      if (socket) {
        console.log('⚠️ Socket ya existe, abortando');
        return;
      }

      console.log('[DEBUG] Backend URL:', BACKEND_URL);
      socket = io(BACKEND_URL);

      socket.on('connect', () => {
        console.log('\n✅ ═══ CONECTADO AL BACKEND ═══');
        console.log('[DEBUG] Socket ID:', socket.id);
        socket.emit('check_status');
      });

      socket.on('qr', (qrDataUrl) => {
        console.log('\n📱 ═══ QR CODE RECIBIDO ═══');
        document.getElementById('qrCode').innerHTML = `<img src="${qrDataUrl}">`;
        document.getElementById('qrStatus').textContent = 'Escanea este código con WhatsApp';
      });

      socket.on('whatsapp_ready', () => {
        console.log('\n✅ ═══ WHATSAPP READY ═══');
        document.getElementById('qrContainer').classList.add('hidden');
        document.getElementById('whatsappConnected').classList.remove('hidden');
        document.getElementById('startChatBtn').classList.remove('hidden');
      });

      socket.on('new_message', (data) => {
        console.log('\n📨 ═══ NUEVO MENSAJE ═══', data);
        addMessage('user', `💬 ${data.fromName}: ${data.body}`);
      });

      socket.on('ai_response', (data) => {
        console.log('\n🤖 ═══ RESPUESTA DE MIIA ═══', data);
        addMessage('miia', `🤖 MIIA: ${data.body}`);
      });
    }

    function goToChat() {
      document.getElementById('whatsappSetup').classList.add('hidden');
      document.getElementById('chatContainer').classList.remove('hidden');
      showWelcomeMessage();
    }

    async function showWelcomeMessage() {
      addMessage('miia', '¡Hola! Soy MIIA 🤖\n\n📱 WhatsApp conectado!\n\nPuedes hablarme naturalmente.\n\n¿En qué puedo ayudarte?');
    }

    function addMessage(sender, text) {
      const messagesDiv = document.getElementById('chatMessages');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;
      messageDiv.innerHTML = `<div class="message-bubble">${text.replace(/\n/g, '<br>')}</div>`;
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      addMessage('user', message);
      input.value = '';
      
      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;

      console.log('\n[SEND] 📤 Enviando mensaje al backend...');
      console.log('[SEND] Message:', message);

      try {
        const response = await fetch(`${BACKEND_URL}/api/train`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });

        console.log('[SEND] Response status:', response.status);

        if (!response.ok) {
          throw new Error('Error al procesar mensaje');
        }

        const data = await response.json();
        console.log('[SEND] ✅ Respuesta recibida, guardado:', data.saved);

        addMessage('miia', data.response);
      } catch (error) {
        console.error('[SEND] ❌ Error:', error);
        addMessage('miia', `❌ Error: ${error.message}`);
      }
      
      sendBtn.disabled = false;
    }

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }
  </script>
</body>
</html>
