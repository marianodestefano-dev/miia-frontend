<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIIA - Iniciar Sesión</title>
  <style>
    /* ═══════════════════════════════════════
       MIIA SaaS Premium — Sistema de Diseño
       ═══════════════════════════════════════ */
    :root {
      --primary: #667eea;
      --primary-dark: #5568d3;
      --secondary: #764ba2;
      --accent: #25d366;
      --accent-dark: #1ebe5a;
      --bg-light: #f5f7fa;
      --bg-white: #ffffff;
      --text-dark: #1a1a2e;
      --text-body: #4a4a6a;
      --text-muted: #8888a4;
      --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-accent: linear-gradient(135deg, #25d366 0%, #1ebe5a 100%);
      --shadow-sm: 0 2px 8px rgba(102, 126, 234, 0.08);
      --shadow-md: 0 8px 30px rgba(102, 126, 234, 0.12);
      --shadow-lg: 0 20px 60px rgba(102, 126, 234, 0.18);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-full: 50px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-body);
      background: var(--gradient-main);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      line-height: 1.6;
      overflow-x: hidden;
      position: relative;
    }

    /* Decorative circles */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -20%;
      width: 800px;
      height: 800px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -30%;
      left: -10%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══ ANIMATIONS ═══ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ═══ LOGIN CONTAINER ═══ */
    .login-container {
      background: var(--bg-white);
      padding: 60px 50px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      max-width: 460px;
      width: 100%;
      position: relative;
      z-index: 1;
      animation: fadeIn 0.8s ease forwards;
    }

    .logo {
      text-align: center;
      font-size: 2.4rem;
      font-weight: 800;
      background: var(--gradient-main);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      letter-spacing: -0.5px;
    }

    h2 {
      text-align: center;
      color: var(--text-dark);
      margin-bottom: 8px;
      font-size: 2rem;
      font-weight: 800;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      margin-bottom: 32px;
      border-bottom: 2px solid #f0f0f0;
      gap: 0;
    }

    .tab {
      flex: 1;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }

    .tab:hover {
      color: var(--primary);
    }

    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .form-group {
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--text-dark);
      font-weight: 500;
      font-size: 0.95rem;
    }

    input, select {
      width: 100%;
      padding: 13px 16px;
      border: 2px solid #f0f0f0;
      border-radius: var(--radius-sm);
      font-size: 1rem;
      transition: all 0.3s ease;
      background: var(--bg-white);
      color: var(--text-dark);
      font-family: inherit;
    }

    input::placeholder {
      color: var(--text-muted);
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--gradient-main);
      color: white;
      border: none;
      border-radius: var(--radius-full);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 8px;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .divider {
      text-align: center;
      margin: 32px 0;
      color: var(--text-muted);
      position: relative;
      font-size: 0.9rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 35%;
      height: 1px;
      background: #f0f0f0;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .google-btn {
      width: 100%;
      padding: 14px;
      background: var(--bg-white);
      color: var(--text-dark);
      border: 2px solid #f0f0f0;
      border-radius: var(--radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
    }

    .google-btn:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .message {
      padding: 14px 16px;
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      display: none;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error {
      background: #fee;
      color: #c33;
      border-left: 4px solid #c33;
    }

    .success {
      background: #efe;
      color: #3c3;
      border-left: 4px solid #3c3;
    }

    .hidden {
      display: none;
    }

    .back-link {
      text-align: center;
      margin-top: 28px;
    }

    .back-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .back-link a:hover {
      gap: 10px;
    }

    @media (max-width: 600px) {
      .login-container {
        padding: 40px 25px;
      }

      h2 {
        font-size: 1.5rem;
      }

      .subtitle {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container fade-in">
    <div class="logo">MIIA</div>
    <h2>Bienvenido</h2>
    <p class="subtitle">Tu asistente IA que vende por WhatsApp 24/7</p>

    <div class="message error" id="errorMessage"></div>
    <div class="message success" id="successMessage"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="tab" onclick="switchTab('register')">Registrarse</div>
    </div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Iniciar Sesión</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Nombre/Empresa</label>
        <input type="text" id="registerName" required placeholder="Tu nombre o empresa">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>WhatsApp (con código país)</label>
        <input type="tel" id="registerWhatsapp" required placeholder="+57 300 123 4567">
      </div>
      <div class="form-group">
        <label>Plan</label>
        <select id="registerPlan" required>
          <option value="basic">Básico - $29/mes</option>
          <option value="pro" selected>Pro - $79/mes</option>
          <option value="enterprise">Enterprise - $199/mes</option>
        </select>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn">Crear Cuenta</button>
    </form>

    <div class="divider">O continúa con</div>

    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
      </svg>
      Google
    </button>

    <div class="back-link">
      <a href="index.html">← Volver al inicio</a>
    </div>
  </div>

  <script>
    // Intersection Observer
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, i) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), i * 100);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      if (tab === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
      } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
      }
    }

    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      if (!email || !password) {
        showError('Por favor completa todos los campos');
        return;
      }

      showSuccess('¡Bienvenido! Redirigiendo al dashboard...');

      setTimeout(() => {
        localStorage.setItem('miia_user', JSON.stringify({
          email: email,
          logged_in: true,
          login_time: new Date().toISOString()
        }));
        window.location.href = 'dashboard.html';
      }, 1500);
    }

    function handleRegister(event) {
      event.preventDefault();
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const whatsapp = document.getElementById('registerWhatsapp').value;
      const plan = document.getElementById('registerPlan').value;
      const password = document.getElementById('registerPassword').value;

      if (password.length < 6) {
        showError('La contraseña debe tener al menos 6 caracteres');
        return;
      }

      if (!whatsapp.startsWith('+')) {
        showError('El WhatsApp debe incluir código país (ejemplo: +57)');
        return;
      }

      showSuccess('¡Cuenta creada exitosamente! Bienvenido a MIIA 🎉');

      setTimeout(() => {
        localStorage.setItem('miia_user', JSON.stringify({
          name: name,
          email: email,
          whatsapp: whatsapp,
          plan: plan,
          logged_in: true,
          registered_at: new Date().toISOString()
        }));
        window.location.href = 'dashboard.html';
      }, 1500);
    }

    function handleGoogleLogin() {
      showError('Próximamente: Login con Google. Por ahora usa email y contraseña.');
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      successDiv.style.display = 'none';
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';

      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }

    function showSuccess(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');

      errorDiv.style.display = 'none';
      successDiv.textContent = message;
      successDiv.style.display = 'block';
    }

    window.onload = function() {
      const user = localStorage.getItem('miia_user');
      if (user) {
        const userData = JSON.parse(user);
        if (userData.logged_in) {
          window.location.href = 'dashboard.html';
        }
      }
    };
  </script>
</body>
</html>
