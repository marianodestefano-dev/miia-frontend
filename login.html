<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIIA - Iniciar Sesión</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .login-container {
      background: white;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 450px;
      width: 100%;
    }
    
    .logo {
      text-align: center;
      font-size: 4rem;
      margin-bottom: 10px;
    }
    
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 1.8rem;
    }
    
    .tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #eee;
    }
    
    .tab {
      flex: 1;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      color: #666;
      font-weight: 600;
      border-bottom: 3px solid transparent;
      transition: all 0.3s;
    }
    
    .tab.active {
      color: #667eea;
      border-bottom-color: #667eea;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }
    
    input, select {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    
    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }
    
    .btn:hover {
      background: #5568d3;
    }
    
    .divider {
      text-align: center;
      margin: 30px 0;
      color: #999;
      position: relative;
    }
    
    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #eee;
    }
    
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    
    .google-btn {
      width: 100%;
      padding: 15px;
      background: white;
      color: #333;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .google-btn:hover {
      border-color: #667eea;
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
    }
    
    .message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .error { 
      background: #fee; 
      color: #c33; 
      border-left: 4px solid #c33;
    }
    
    .success { 
      background: #efe; 
      color: #3c3; 
      border-left: 4px solid #3c3;
    }
    
    .hidden { display: none; }
    
    .back-link {
      text-align: center;
      margin-top: 20px;
    }
    
    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    
    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">🤖</div>
    <h2>Bienvenido a MIIA</h2>
    
    <div class="message error" id="errorMessage"></div>
    <div class="message success" id="successMessage"></div>
    
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="tab" onclick="switchTab('register')">Registrarse</div>
    </div>
    
    <!-- Login Form -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn">Iniciar Sesión</button>
    </form>
    
    <!-- Register Form -->
    <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Nombre/Empresa</label>
        <input type="text" id="registerName" required placeholder="Tu nombre o empresa">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="registerEmail" required placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>WhatsApp (con código país)</label>
        <input type="tel" id="registerWhatsapp" required placeholder="+57 300 123 4567">
      </div>
      <div class="form-group">
        <label>Plan</label>
        <select id="registerPlan" required>
          <option value="basic">Básico - $29/mes</option>
          <option value="pro" selected>Pro - $79/mes</option>
          <option value="enterprise">Enterprise - $199/mes</option>
        </select>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
      </div>
      <button type="submit" class="btn">Crear Cuenta</button>
    </form>
    
    <div class="divider">O continúa con</div>
    
    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg width="20" height="20" viewBox="0 0 20 20">
        <path fill="#4285F4" d="M19.6 10.23c0-.82-.1-1.42-.25-2.05H10v3.72h5.5c-.15.96-.74 2.31-2.04 3.22v2.45h3.16c1.89-1.73 2.98-4.3 2.98-7.34z"/>
        <path fill="#34A853" d="M13.46 15.13c-.83.59-1.96 1-3.46 1-2.64 0-4.88-1.74-5.68-4.15H1.07v2.52C2.72 17.75 6.09 20 10 20c2.7 0 4.96-.89 6.62-2.42l-3.16-2.45z"/>
        <path fill="#FBBC05" d="M3.99 10c0-.69.12-1.35.32-1.97V5.51H1.07A9.973 9.973 0 000 10c0 1.61.39 3.14 1.07 4.49l3.24-2.52c-.2-.62-.32-1.28-.32-1.97z"/>
        <path fill="#EA4335" d="M10 3.88c1.88 0 3.13.81 3.85 1.48l2.84-2.76C14.96.99 12.7 0 10 0 6.09 0 2.72 2.25 1.07 5.51l3.24 2.52C5.12 5.62 7.36 3.88 10 3.88z"/>
      </svg>
      Google
    </button>
    
    <div class="back-link">
      <a href="index.html">← Volver a inicio</a>
    </div>
  </div>

  <script>
    // Cambiar entre tabs de Login y Registro
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      if (tab === 'login') {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
      } else {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
      }
    }
    
    // Manejar inicio de sesión
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      
      // Validación simple
      if (!email || !password) {
        showError('Por favor completa todos los campos');
        return;
      }
      
      // Por ahora guardamos en localStorage (después usaremos Firebase)
      showSuccess('¡Bienvenido! Redirigiendo al dashboard...');
      
      setTimeout(() => {
        // Guardar sesión
        localStorage.setItem('miia_user', JSON.stringify({
          email: email,
          logged_in: true,
          login_time: new Date().toISOString()
        }));
        
        // Redirigir al dashboard
        window.location.href = 'dashboard.html';
      }, 1500);
    }
    
    // Manejar registro
    function handleRegister(event) {
      event.preventDefault();
      const name = document.getElementById('registerName').value;
      const email = document.getElementById('registerEmail').value;
      const whatsapp = document.getElementById('registerWhatsapp').value;
      const plan = document.getElementById('registerPlan').value;
      const password = document.getElementById('registerPassword').value;
      
      // Validaciones
      if (password.length < 6) {
        showError('La contraseña debe tener al menos 6 caracteres');
        return;
      }
      
      if (!whatsapp.startsWith('+')) {
        showError('El WhatsApp debe incluir código país (ejemplo: +57)');
        return;
      }
      
      // Por ahora guardamos en localStorage (después usaremos Firebase)
      showSuccess('¡Cuenta creada exitosamente! Bienvenido a MIIA 🎉');
      
      setTimeout(() => {
        // Guardar datos del usuario
        localStorage.setItem('miia_user', JSON.stringify({
          name: name,
          email: email,
          whatsapp: whatsapp,
          plan: plan,
          logged_in: true,
          registered_at: new Date().toISOString()
        }));
        
        // Redirigir al dashboard
        window.location.href = 'dashboard.html';
      }, 1500);
    }
    
    // Login con Google (próximamente con Firebase)
    function handleGoogleLogin() {
      showError('Próximamente: Login con Google. Por ahora usa email y contraseña.');
    }
    
    // Mostrar mensaje de error
    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      
      successDiv.style.display = 'none';
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      
      setTimeout(() => {
        errorDiv.style.display = 'none';
      }, 5000);
    }
    
    // Mostrar mensaje de éxito
    function showSuccess(message) {
      const errorDiv = document.getElementById('errorMessage');
      const successDiv = document.getElementById('successMessage');
      
      errorDiv.style.display = 'none';
      successDiv.textContent = message;
      successDiv.style.display = 'block';
    }
    
    // Al cargar la página, verificar si ya hay sesión
    window.onload = function() {
      const user = localStorage.getItem('miia_user');
      if (user) {
        const userData = JSON.parse(user);
        if (userData.logged_in) {
          // Ya está logueado, redirigir al dashboard
          window.location.href = 'dashboard.html';
        }
      }
    };
  </script>
</body>
</html>
